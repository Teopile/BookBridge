name: CI

# Runs on every push and PR to main. Three independent jobs:
#   1. frontend-build  — hard gate: the Vite build must succeed.
#   2. api-smoke       — read-only smoke test against the LIVE API (non-blocking;
#                        a live-dependency outage shouldn't block merges).
#   3. e2e             — lightweight Playwright run against the LIVE site
#                        (non-blocking; flaky network shouldn't block merges).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # 1. Frontend build — the only hard gate.
  # ----------------------------------------------------------------
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Use a clean, reproducible install when a lockfile exists; fall back to
      # `npm install` if the frontend has no lockfile of its own.
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ----------------------------------------------------------------
  # 2. Live API smoke test — read-only, non-blocking.
  # ----------------------------------------------------------------
  api-smoke:
    name: API smoke test (live, read-only)
    runs-on: ubuntu-latest
    # Live-dependency checks can be flaky (cold serverless start, network);
    # surface failures without blocking the merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # The smoke test uses only Node built-ins (fetch) and needs no deps or env.
      - name: Run live API smoke test
        run: node server/scripts/live-api-smoke-test.mjs

  # ----------------------------------------------------------------
  # 3. Playwright E2E — lightweight, live site, non-blocking.
  # ----------------------------------------------------------------
  e2e:
    name: E2E (Playwright, live site)
    runs-on: ubuntu-latest
    # Live-site E2E over the network can be flaky; keep it informational.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # tests/e2e/node_modules is a local junction (gitignored), so install the
      # runner fresh here. The specs import from `playwright/test`.
      - name: Install Playwright runner
        working-directory: tests/e2e
        run: npm install --no-save playwright

      - name: Install Playwright browsers (chromium)
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E against live site
        working-directory: tests/e2e
        run: npx playwright test --project=chromium
