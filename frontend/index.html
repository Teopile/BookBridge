<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2D8B7A" />
    <meta name="color-scheme" content="light" />

    <title>BookBridge — Your book is awaited in the mountains</title>
    <meta name="description" content="BookBridge connects donors with Georgian highland schools. Pick a school, choose books, we deliver. Built for transparency — track every donation end to end." />
    <link rel="canonical" href="https://bookbridge.ge/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BookBridge" />
    <meta property="og:title" content="BookBridge — Your book is awaited in the mountains" />
    <meta property="og:description" content="Donate books to Georgian highland schools. Pick a school, choose books, we deliver." />
    <meta property="og:url" content="https://bookbridge.ge/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ka_GE" />
    <!--
      TODO before public launch: add a real 1200x630 PNG at /public/og-image.png
      and switch the two og:image / twitter:image tags below back to
      https://bookbridge.ge/og-image.png (and restore og:image:width/height 1200x630).
      Until then we point at the existing /logo.svg so the tag resolves instead of 404ing.
      Note: many social scrapers (e.g. Facebook) ignore SVG previews — the PNG is required for rich cards.
    -->
    <meta property="og:image" content="https://bookbridge.ge/logo.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:alt" content="BookBridge — Donate books to Georgian highland schools" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BookBridge — Your book is awaited in the mountains" />
    <meta name="twitter:description" content="Donate books to Georgian highland schools. Pick a school, choose books, we deliver." />
    <meta name="twitter:image" content="https://bookbridge.ge/logo.svg" />

    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <!-- TODO before launch: add a real 180x180 PNG at /public/apple-touch-icon.png (file is currently MISSING -> this link 404s on iOS home-screen add). -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://tile.openstreetmap.org" crossorigin />

    <!-- Fonts (Georgian + system fallback in CSS) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Leaflet CSS (only needed on /schools map view, but small enough to preload) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NGO",
      "name": "BookBridge",
      "url": "https://bookbridge.ge/",
      "logo": "https://bookbridge.ge/logo.svg",
      "description": "BookBridge connects donors with Georgian highland schools to deliver books to children in remote villages.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "GE"
      },
      "areaServed": "GE",
      "email": "info@bookbridge.ge"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding:32px;font-family:sans-serif;text-align:center;color:#1C2B27;background:#FAF7F2;">
        <h1>BookBridge</h1>
        <p>This site needs JavaScript to run. Please enable JavaScript in your browser, or write to <a href="mailto:info@bookbridge.ge">info@bookbridge.ge</a>.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
